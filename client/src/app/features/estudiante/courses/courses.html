<h1 class="section-title"><app-icon name="book-open" [size]="22" /> Mis cursos</h1>

@if (courses().length > 0) {
  @for (course of courses(); track course.id) {
    <section class="card course-block">
      <div class="course-header">
        <h2 class="section-title"><app-icon name="folder" [size]="18" /> {{ course.name }}</h2>
        <a [routerLink]="['/cursos', course.id, 'info']" class="link-with-icon">
          <app-icon name="info" [size]="14" /> Información del curso
        </a>
      </div>
      <ul class="unit-list">
        @for (unit of course.units; track unit.id) {
          <li>
            <a [routerLink]="['/estudiante/units', unit.id]" class="link-with-icon">
              <app-icon name="arrow-right" [size]="13" /> {{ unit.name }}
            </a>
          </li>
        }
      </ul>
    </section>
  }
} @else {
  <app-empty-state
    icon="book-open"
    title="Aún no estás inscrito en ningún curso"
    description="Pídele a tu docente que te inscriba en un curso para poder empezar."
  />
}
